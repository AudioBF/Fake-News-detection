<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake News Classifier · BERT</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0D0F;
    --surface: #111518;
    --surface2: #181D21;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --text: #E2E8EF;
    --muted: #4A5568;
    --real: #00C896;
    --fake: #FF4757;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Fraunces', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glow */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(0,200,150,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 780px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header { margin-bottom: 3rem; }
  .header-tag {
    font-size: 11px;
    color: var(--real);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-tag::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--real);
  }
  .header h1 {
    font-family: var(--serif);
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 300;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.6rem;
  }
  .header h1 em {
    font-style: italic;
    color: var(--real);
  }
  .header-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* Input area */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    padding: 1.5rem;
    margin-bottom: 1rem;
    position: relative;
  }
  .input-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    display: block;
  }
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    padding: 1rem;
    resize: vertical;
    min-height: 140px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  textarea:focus { border-color: var(--real); }
  textarea::placeholder { color: var(--muted); }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .char-count {
    font-size: 11px;
    color: var(--muted);
  }
  .btn {
    background: var(--real);
    color: #000;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    padding: 12px 28px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    display: none;
    animation: spin 0.7s linear infinite;
  }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  .result-card {
    border: 1px solid var(--border2);
    padding: 1.5rem;
    margin-bottom: 1rem;
    display: none;
    animation: fadeUp 0.4s ease forwards;
  }
  .result-card.visible { display: block; }
  .result-card.real { border-color: rgba(0,200,150,0.3); background: rgba(0,200,150,0.04); }
  .result-card.fake { border-color: rgba(255,71,87,0.3); background: rgba(255,71,87,0.04); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .result-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .result-verdict {
    font-family: var(--serif);
    font-size: 2.5rem;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .result-verdict.real { color: var(--real); }
  .result-verdict.fake { color: var(--fake); }
  .result-confidence {
    text-align: right;
  }
  .result-confidence .conf-num {
    font-size: 2rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }
  .result-confidence .conf-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Probability bars */
  .prob-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .prob-item {
    display: grid;
    grid-template-columns: 60px 1fr 50px;
    gap: 10px;
    align-items: center;
  }
  .prob-name {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .prob-bar-bg {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .prob-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  .prob-bar-fill.real { background: var(--real); }
  .prob-bar-fill.fake { background: var(--fake); }
  .prob-pct {
    font-size: 12px;
    color: var(--text);
    text-align: right;
  }

  /* Examples */
  .examples-section { margin-bottom: 1rem; }
  .examples-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .examples-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .examples-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .example-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .example-card:hover { background: var(--surface2); border-color: var(--border2); }
  .example-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .example-tag.real { color: var(--real); }
  .example-tag.fake { color: var(--fake); }
  .example-tag::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .example-text {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .example-hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
    opacity: 0.6;
    letter-spacing: 0.05em;
  }

  /* Footer */
  .footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .footer-left { font-size: 11px; color: var(--muted); }
  .footer-left strong { color: var(--text); }
  .footer-right { font-size: 11px; color: var(--muted); }

  @media (max-width: 600px) {
    .examples-grid { grid-template-columns: 1fr; }
    .result-header { flex-direction: column; }
    .result-confidence { text-align: left; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-tag">BERT · bert-base-uncased · fine-tuned</div>
    <h1>Fake News<br><em>Classifier</em></h1>
    <div class="header-sub">// NLP · Transformers · Flask API · Audio Fagundes</div>
  </div>

  <!-- Input -->
  <div class="input-card">
    <label class="input-label" for="newsText">Paste a news article or headline</label>
    <textarea id="newsText" placeholder="e.g. WASHINGTON (Reuters) — The Federal Reserve held interest rates steady on Wednesday..."></textarea>
    <div class="input-footer">
      <span class="char-count" id="charCount">0 characters</span>
      <button class="btn" id="classifyBtn" onclick="classify()">
        <div class="spinner"></div>
        <span class="btn-text">Classify →</span>
      </button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div>
        <div class="result-label">Verdict</div>
        <div class="result-verdict" id="resultVerdict">REAL</div>
      </div>
      <div class="result-confidence">
        <div class="conf-label">Confidence</div>
        <div class="conf-num" id="resultConfidence">—</div>
      </div>
    </div>
    <div class="prob-row">
      <div class="prob-item">
        <span class="prob-name">Real</span>
        <div class="prob-bar-bg"><div class="prob-bar-fill real" id="barReal"></div></div>
        <span class="prob-pct" id="pctReal">—</span>
      </div>
      <div class="prob-item">
        <span class="prob-name">Fake</span>
        <div class="prob-bar-bg"><div class="prob-bar-fill fake" id="barFake"></div></div>
        <span class="prob-pct" id="pctFake">—</span>
      </div>
    </div>
  </div>

  <!-- Examples -->
  <div class="examples-section">
    <div class="examples-label">Try these examples</div>
    <div class="examples-grid" id="examplesGrid"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-left">Built by <strong>Audio Fagundes</strong> · AI Software Engineer · Dublin 🇮🇪</div>
    <div class="footer-right">bert-base-uncased · Val Accuracy 100%</div>
  </div>

</div>

<script>
const examples = [
  {
    type: 'real',
    label: 'Reuters — Economy',
    text: "WASHINGTON (Reuters) - The United States Federal Reserve held interest rates steady on Wednesday, citing continued uncertainty in global markets and a need to assess incoming economic data before making any adjustments to monetary policy."
  },
  {
    type: 'fake',
    label: 'Conspiracy',
    text: "BREAKING: Scientists have confirmed that the government has been secretly adding chemicals to drinking water for decades to control the population. Whistleblowers inside the EPA have revealed documents proving this conspiracy has been ongoing since the 1970s."
  },
  {
    type: 'real',
    label: 'Reuters — Politics',
    text: "BERLIN (Reuters) - German Chancellor met with European Union leaders in Brussels on Thursday to discuss new energy policies aimed at reducing the bloc's dependence on imported natural gas ahead of the winter season."
  },
  {
    type: 'fake',
    label: 'Sensationalist',
    text: "SHOCKING: Donald Trump was secretly arrested last night by military forces and taken to Guantanamo Bay. The mainstream media is hiding this from you. Share before this gets deleted!"
  },
  {
    type: 'real',
    label: 'Reuters — Finance',
    text: "TOKYO (Reuters) - Japan's central bank kept its ultra-loose monetary policy unchanged on Friday, maintaining negative interest rates as policymakers wait for more evidence that wages and inflation are rising sustainably."
  },
  {
    type: 'fake',
    label: 'Misinformation',
    text: "NASA has been hiding alien contact since 1947. Former employees have come forward with classified documents proving extraterrestrial life has been living among us. The deep state does not want you to know this truth."
  }
];

// Render examples
const grid = document.getElementById('examplesGrid');
examples.forEach(ex => {
  const card = document.createElement('div');
  card.className = 'example-card';
  card.innerHTML = `
    <div class="example-tag ${ex.type}">${ex.label}</div>
    <div class="example-text">${ex.text}</div>
    <div class="example-hint">click to load →</div>
  `;
  card.onclick = () => {
    document.getElementById('newsText').value = ex.text;
    updateCharCount();
    document.getElementById('newsText').focus();
  };
  grid.appendChild(card);
});

// Char counter
const textarea = document.getElementById('newsText');
const charCount = document.getElementById('charCount');
function updateCharCount() {
  charCount.textContent = textarea.value.length + ' characters';
}
textarea.addEventListener('input', updateCharCount);

// Classify
async function classify() {
  const text = textarea.value.trim();
  if (!text) return;

  const btn = document.getElementById('classifyBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const response = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await response.json();

    const isReal = data.prediction === 'REAL';
    const conf = parseFloat(data.confidence);
    const confOther = 100 - conf;

    const card = document.getElementById('resultCard');
    const verdict = document.getElementById('resultVerdict');
    const confidence = document.getElementById('resultConfidence');

    card.className = 'result-card visible ' + (isReal ? 'real' : 'fake');
    verdict.textContent = data.prediction;
    verdict.className = 'result-verdict ' + (isReal ? 'real' : 'fake');
    confidence.textContent = data.confidence;

    // Bars
    const barReal = document.getElementById('barReal');
    const barFake = document.getElementById('barFake');
    const pctReal = document.getElementById('pctReal');
    const pctFake = document.getElementById('pctFake');

    if (isReal) {
      barReal.style.width = conf + '%';
      barFake.style.width = confOther + '%';
      pctReal.textContent = conf.toFixed(2) + '%';
      pctFake.textContent = confOther.toFixed(2) + '%';
    } else {
      barFake.style.width = conf + '%';
      barReal.style.width = confOther + '%';
      pctFake.textContent = conf.toFixed(2) + '%';
      pctReal.textContent = confOther.toFixed(2) + '%';
    }

    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  } catch (err) {
    alert('Error connecting to the classifier. Make sure the Flask server is running.');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// Enter to submit
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) classify();
});
</script>
</body>
</html>
